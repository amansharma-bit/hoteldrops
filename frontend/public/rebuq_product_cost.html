<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#1447b8;--dark:#0D1A30;--white:#fff;--fg:#0D1117;
  --muted:#6B7280;--border:#E5E7EB;--bg:#F9FAFB;
  --gold:#FCD34D;--green:#16a34a;--green-l:#D1FAE5;--amber:#D97706;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Inter',-apple-system,sans-serif}
body{background:var(--dark)}
.progress-bar{position:fixed;top:0;left:0;right:0;height:2px;background:rgba(255,255,255,0.08);z-index:200}
.pf{height:100%;background:var(--blue);transition:width 0.4s cubic-bezier(0.4,0,0.2,1)}
.deck{position:fixed;inset:0;display:flex;flex-direction:column}
.vp{flex:1;position:relative;overflow:hidden}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;transition:opacity 0.35s ease,transform 0.35s ease;overflow:hidden}
.dark-slide{background:linear-gradient(135deg,#0D1B6E 0%,#1447b8 45%,#2563EB 75%,#3B82F6 100%)}
.light-slide{background:var(--white)}
.hidden-next{opacity:0;transform:translateY(16px);pointer-events:none}
.hidden-prev{opacity:0;transform:translateY(-16px);pointer-events:none}
.active{opacity:1;transform:translateY(0);pointer-events:all}
body.scroll-mode .deck{display:none}
.scroll-doc{display:none}
body.scroll-mode .scroll-doc{display:block;height:100%;overflow-y:auto;background:var(--bg)}
body.scroll-mode .progress-bar{display:none}
.top-nav{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:0 52px;height:52px;z-index:10}
.nl{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;display:flex;align-items:center;gap:10px;color:var(--muted)}
.nl.dark{color:rgba(255,255,255,0.3)}
.nd{width:20px;height:1px;background:var(--border)}
.nd.dark{background:rgba(255,255,255,0.2)}
.nlogo{font-family:'Sora',sans-serif;font-size:14px;font-weight:800;color:var(--fg)}
.nlogo.dark{color:rgba(255,255,255,0.9)}
.nlogo .dot{color:var(--gold)}
.sb{flex:1;padding:60px 52px 44px;display:flex;flex-direction:column}
.bb{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 52px;background:rgba(13,26,48,0.97);border-top:1px solid rgba(255,255,255,0.06);flex-shrink:0;z-index:100}
.nb{background:none;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);font-size:12px;font-weight:600;padding:6px 16px;border-radius:20px;cursor:pointer;transition:all 0.2s}
.nb:hover{background:rgba(255,255,255,0.08);color:#fff}
.nb:disabled{opacity:0.2;cursor:default}
.ctr{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.06em}
.vt{display:flex;gap:4px;background:rgba(255,255,255,0.06);border-radius:20px;padding:3px;border:1px solid rgba(255,255,255,0.1)}
.tb{padding:5px 14px;border-radius:16px;font-size:11px;font-weight:600;background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.2s}
.tb.on{background:var(--blue);color:#fff}
.ey{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.h2{font-family:'Sora',sans-serif;font-weight:800;letter-spacing:-0.025em;line-height:1.1;color:var(--fg)}
.sub{font-size:14px;color:var(--muted);line-height:1.6}
.ac{color:var(--blue)}
/* SCOPE */
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;flex:1}
.sc{background:#fff;border:1px solid var(--border);border-radius:16px;padding:28px 24px;display:flex;flex-direction:column}
.sci{width:48px;height:48px;border-radius:12px;background:rgba(20,71,184,0.08);display:flex;align-items:center;justify-content:center;margin-bottom:18px;flex-shrink:0}
.sci.gr{background:#F3F4F6}
.sc h3{font-family:'Sora',sans-serif;font-size:16px;font-weight:700;color:var(--fg);margin-bottom:8px}
.sc p{font-size:13px;color:var(--muted);line-height:1.7;flex:1}
.wb{background:#FFFBEB;border:1px solid #FDE68A;border-radius:10px;padding:14px 20px;font-size:12px;color:#92400e;font-weight:600;margin-top:16px;flex-shrink:0}
.wb span{font-weight:400;color:#B45309}
/* COST */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;flex:1}
.cs{background:#F9FAFB;border:1px solid var(--border);border-radius:14px;padding:20px 22px;display:flex;flex-direction:column}
.cst{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;flex-shrink:0}
.crow-wrap{flex:1;overflow:hidden}
.cr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.cr:last-child{border-bottom:none}
.crl{font-size:12px;font-weight:600;color:var(--fg)}
.crn{font-size:10px;color:var(--muted)}
.crv{font-family:'Sora',sans-serif;font-size:12px;font-weight:700;color:var(--blue);white-space:nowrap;margin-left:8px;flex-shrink:0}
.crv small{font-size:10px;font-weight:400;color:var(--muted)}
.vs{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-top:16px;flex-shrink:0}
.vsi{padding:16px 20px;border-right:1px solid var(--border);text-align:center}
.vsi:last-child{border-right:none}
.vsi .n{font-family:'Sora',sans-serif;font-size:20px;font-weight:800;color:var(--blue);display:block}
.vsi.am .n{color:var(--amber)}
.vsi.gd .n{color:var(--green)}
.vsi .l{font-size:10px;color:var(--muted);margin-top:3px}
.cb{background:rgba(20,71,184,0.05);border:1px solid rgba(20,71,184,0.15);border-radius:11px;padding:14px 16px;margin-top:14px;flex-shrink:0}
.cbt{font-size:11px;font-weight:700;color:var(--blue);margin-bottom:9px}
.ctags{display:flex;flex-wrap:wrap;gap:7px}
.ctag{background:rgba(20,71,184,0.08);border:1px solid rgba(20,71,184,0.15);border-radius:7px;padding:5px 11px;font-size:11px;color:var(--fg);font-weight:600}
.ctag small{color:var(--muted);font-weight:400;font-size:10px;display:block}
/* CMP */
.cmp{width:100%;border-collapse:collapse;border-radius:14px;overflow:hidden;border:1px solid var(--border)}
.cmp th{padding:12px 18px;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
.cmp th:first-child{background:#F3F4F6;color:var(--muted);text-align:left;width:28%}
.cmp th:nth-child(2){background:#F9FAFB;color:var(--muted);text-align:center}
.cmp th:nth-child(3){background:var(--blue);color:var(--gold);text-align:center}
.cmp td{padding:11px 18px;font-size:12px;border-bottom:1px solid var(--border)}
.cmp tr:last-child td{border-bottom:none}
.cmp td:first-child{font-weight:600;color:var(--fg);background:#FAFAFA}
.cmp td:nth-child(2){color:var(--muted);text-align:center;background:#FDFDFD}
.cmp td:nth-child(3){font-weight:700;color:var(--green);text-align:center;background:rgba(22,163,74,0.05)}
.cmp td.nt{color:var(--muted);font-weight:400;background:#FDFDFD}
.tc{display:flex;align-items:center;justify-content:center;gap:6px}
.sbar{background:var(--gold);border-radius:13px;padding:20px 28px;display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:16px;flex-wrap:wrap;flex-shrink:0}
.sbar h3{font-family:'Sora',sans-serif;font-size:18px;font-weight:800;color:#0D1A30;margin:0}
.sbar p{font-size:12px;color:rgba(13,26,48,0.6);margin-top:3px}
.snums{display:flex;gap:28px}
.snums .n{font-family:'Sora',sans-serif;font-size:22px;font-weight:800;color:#0D1A30;display:block}
.snums .l{font-size:10px;font-weight:700;letter-spacing:0.08em;color:rgba(13,26,48,0.45)}
/* PROOF — 4 cards 2x2 */
.pg4{display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(2,1fr);gap:16px;flex:1}
.pc{border-radius:16px;padding:32px 28px;border:1px solid var(--border);display:flex;flex-direction:column}
.pc.bl{background:var(--blue);border-color:var(--blue)}
.pc.wh{background:#fff}
.pico{margin-bottom:14px;display:flex}
.pn{font-family:'Sora',sans-serif;font-size:44px;font-weight:800;line-height:1;margin-bottom:8px}
.pc.bl .pn{color:var(--gold)}
.pc.wh .pn{color:var(--blue)}
.plb{font-size:17px;font-weight:700;margin-bottom:6px}
.pc.bl .plb{color:#fff}
.pc.wh .plb{color:var(--fg)}
.ps{font-size:13px;line-height:1.65;flex:1}
.pc.bl .ps{color:rgba(255,255,255,0.6)}
.pc.wh .ps{color:var(--muted)}
.pbox{background:rgba(20,71,184,0.05);border:1px solid rgba(20,71,184,0.15);border-radius:11px;padding:16px 20px;font-size:13px;color:var(--fg);line-height:1.7;margin-top:16px;flex-shrink:0}
/* BMARK */
.bmark{background:#FEF3C7;border:1px solid #FDE68A;border-radius:10px;padding:13px 16px;margin-top:12px;flex-shrink:0}
.bmark-title{font-size:10px;font-weight:700;color:#92400e;margin-bottom:4px;letter-spacing:0.06em}
.bmark-val{font-family:'Sora',sans-serif;font-size:16px;font-weight:800;color:#0D1A30}
.bmark-sub{font-size:11px;color:#B45309;margin-top:2px}
/* MOAT LIGHT */
.moat-header{margin-bottom:16px}
.moat-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;flex:1}
.moat-col-label{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.mc{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:16px 18px;display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
.mc:last-child{margin-bottom:0}
.mc-ico{width:32px;height:32px;border-radius:8px;background:rgba(20,71,184,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.mc-title{font-size:13px;font-weight:700;color:var(--fg);margin-bottom:3px}
.mc-sub{font-size:11px;color:var(--muted);line-height:1.55}
.closing{background:var(--blue);border-radius:12px;padding:20px 28px;text-align:center;flex-shrink:0;margin-top:14px}
.cl{font-family:'Sora',sans-serif;font-size:clamp(14px,1.5vw,18px);font-weight:800;color:#fff;line-height:1.4;letter-spacing:-0.01em}
.cl span{color:var(--gold)}
</style>
</head>

let cur=0,mode='slide';
function render(){
  const vp=document.getElementById('vp');vp.innerHTML='';
  SLIDES.forEach((s,i)=>{
    const d=document.createElement('div');d.innerHTML=s.html;
    const el=d.firstElementChild;
    el.classList.add('slide');
    el.classList.add(i===cur?'active':i>cur?'hidden-next':'hidden-prev');
    vp.appendChild(el);
  });
  document.getElementById('pf').style.width=((cur+1)/SLIDES.length*100)+'%';
  document.getElementById('ctr').textContent=(cur+1)+' / '+SLIDES.length;
  document.getElementById('pb').disabled=cur===0;
  document.getElementById('nb').disabled=cur===SLIDES.length-1;
}
function nav(d){const n=cur+d;if(n<0||n>=SLIDES.length)return;cur=n;render();}
function buildScroll(){
  const sc=document.getElementById('sdc');sc.innerHTML='';
  SLIDES.forEach(s=>{
    const sec=document.createElement('div');
    sec.style.cssText='min-height:100vh;display:flex;flex-direction:column;';
    sec.innerHTML=s.html;
    const el=sec.firstElementChild;
    if(el){el.style.position='relative';el.style.minHeight='100vh';}
    sc.appendChild(sec);
  });
}
function setMode(m){
  mode=m;
  document.body.classList.toggle('scroll-mode',m==='scroll');
  document.querySelectorAll('.tb').forEach(b=>{
    b.classList.toggle('on',(m==='slide'&&b.textContent==='Slides')||(m==='scroll'&&b.textContent==='Scroll'));
  });
  if(m==='scroll')buildScroll();else render();
}
document.addEventListener('keydown',e=>{
  if(mode!=='slide')return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown')nav(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')nav(-1);
});
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;});
document.addEventListener('touchend',e=>{
  if(mode!=='slide')return;
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>50)nav(dx<0?1:-1);
});
render();
</script>
