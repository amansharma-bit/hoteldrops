<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="rebuq Pitch">
  <meta name="theme-color" content="#0D1A30">
  <meta name="description" content="rebuq — Post-Booking Price tracker platform for hotel bookings. Series Seed 2026 Investment Proposal.">
  <link rel="manifest" href="/manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rebuq — Investor Pitch 2026</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap");:root{
  --royal-blue:#3B5BDB;
  --royal-blue-dim:rgba(59,91,219,0.8);
  --dark-bg:#0D1A30;
  --dark-surface:#111f35;
  --white:#ffffff;
  --foreground:#0D1117;
  --muted:#6B7280;
  --border:#E5E7EB;
  --border-dark:rgba(255,255,255,0.08);
  --bg:#F9FAFB;
  --card-bg:#ffffff;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:var(--dark-bg);color:var(--foreground)}

/* NOISE TEXTURE */
.noise-overlay{
  position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:0.5;
}

/* SLIDE CONTAINER */
.deck{position:fixed;inset:0;display:flex;flex-direction:column}
.slide-viewport{flex:1;position:relative;overflow:hidden}
.slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  transition:opacity 0.35s ease,transform 0.35s ease;
}
.slide.dark-slide{background:var(--dark-bg)}
.slide.light-slide{background:var(--white)}
.slide.hidden-next{opacity:0;transform:translateY(16px);pointer-events:none}
.slide.hidden-prev{opacity:0;transform:translateY(-16px);pointer-events:none}
.slide.active{opacity:1;transform:translateY(0);pointer-events:all}

/* PROGRESS BAR */
.progress-bar{
  position:fixed;top:0;left:0;right:0;height:2px;
  background:rgba(255,255,255,0.08);z-index:100;
}
.progress-fill{
  height:100%;background:var(--royal-blue);
  transition:width 0.4s cubic-bezier(0.4,0,0.2,1);
}

/* TOP NAV */
.top-nav{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 48px;height:56px;z-index:10;
}
.nav-section-label{
  font-size:10px;font-weight:600;letter-spacing:0.12em;
  text-transform:uppercase;display:flex;align-items:center;gap:10px;
}
.nav-section-label.dark{color:rgba(255,255,255,0.3)}
.nav-section-label.light{color:var(--muted)}
.nav-dash{width:20px;height:1px}
.nav-dash.dark{background:rgba(255,255,255,0.2)}
.nav-dash.light{background:var(--border)}
.nav-logo{
  font-size:14px;font-weight:700;letter-spacing:-0.01em;
}
.nav-logo.dark{color:rgba(255,255,255,0.9)}
.nav-logo.light{color:var(--foreground)}
.nav-logo span{color:var(--royal-blue)}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;height:52px;z-index:100;
  backdrop-filter:blur(12px);
  transition:background 0.35s,border-color 0.35s;
}
.bottom-nav.dark-nav{
  background:rgba(13,26,48,0.95);
  border-top:1px solid rgba(59,91,219,0.2);
}
.bottom-nav.light-nav{
  background:rgba(255,255,255,0.95);
  border-top:1px solid var(--border);
}
.slide-id{font-size:11px;font-weight:500;letter-spacing:0.04em}
.slide-id.dark-text{color:rgba(255,255,255,0.45)}
.slide-id.light-text{color:var(--muted)}
.brand-label{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase}
.brand-label.dark-text{color:rgba(255,255,255,0.3)}
.brand-label.light-text{color:var(--muted)}

/* DOT NAV */
.dot-nav{display:flex;align-items:center;gap:6px}
.dot{
  height:6px;border-radius:3px;
  border:none;cursor:pointer;
  transition:width 0.25s,background 0.25s;
}
.dot.active{width:20px;background:var(--royal-blue)}
.dot.inactive-dark{width:6px;background:rgba(255,255,255,0.2)}
.dot.inactive-light{width:6px;background:var(--border)}

/* NAV ARROWS */
.nav-arrows{display:flex;gap:8px}
.arrow-btn{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:none;transition:all 0.2s;
}
.arrow-btn.prev-dark{background:transparent;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6)}
.arrow-btn.prev-light{background:transparent;border:1px solid var(--border);color:var(--foreground)}
.arrow-btn.next-btn{background:var(--royal-blue);color:#fff}
.arrow-btn:disabled{opacity:0.3;cursor:not-allowed}
.arrow-btn.next-btn:disabled{background:var(--border)}

/* ============================
   SLIDE CONTENT STYLES
   ============================ */

/* SECTION HEADER */
.section-header{
  display:flex;align-items:center;gap:12px;
  font-size:10px;font-weight:600;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--muted);
  margin-bottom:28px;
}
.section-header::after{content:'';flex:1;height:1px;background:var(--border)}
.section-num{color:var(--foreground);font-weight:700}

/* TYPOGRAPHY */
.slide-title{
  font-size:clamp(28px,3.5vw,44px);
  font-weight:700;letter-spacing:-0.025em;
  color:var(--foreground);margin-bottom:6px;line-height:1.1;
}
.slide-sub{
  font-size:14px;color:var(--muted);
  margin-bottom:40px;font-weight:400;
}

/* CARD */
.card{
  background:var(--white);
  border:1px solid var(--border);
  border-radius:12px;padding:24px;
}
.card.active-card{border-color:var(--royal-blue);background:rgba(59,91,219,0.04)}
.card.dark-card{background:#111f35;border-color:rgba(255,255,255,0.08)}
.card.bg-card{background:var(--bg);border-color:var(--border)}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}

/* STAT */
.stat-label{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.stat-big{font-size:clamp(32px,4vw,52px);font-weight:700;letter-spacing:-0.03em;line-height:1;color:var(--royal-blue);margin:4px 0}
.stat-big.dark-num{color:var(--foreground)}
.stat-desc{font-size:13px;color:var(--muted);line-height:1.55;margin-top:8px}

/* BULLET */
.bullets{list-style:none;display:flex;flex-direction:column;gap:9px;margin-top:12px}
.bullets li{font-size:13px;color:var(--muted);display:flex;align-items:flex-start;gap:9px;line-height:1.5}
.bullets li::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--royal-blue);flex-shrink:0;margin-top:7px}

/* STAGE TAG */
.stage-tag{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:block}
.stage-tag.blue{color:var(--royal-blue)}

/* PILL */
.pill{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;background:rgba(59,91,219,0.08);color:var(--royal-blue);margin:2px}

/* SPLIT */
.split{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start}
.split-wide{display:grid;grid-template-columns:1.15fr 0.85fr;gap:48px;align-items:start}

/* LEDGER */
.ledger{background:var(--bg);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.ledger-header{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ledger-dots{display:flex;gap:5px}
.ldot{width:10px;height:10px;border-radius:50%}
.ledger-title{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.ledger-row{display:flex;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--border);font-size:12px}
.ledger-row:last-child{border-bottom:none}
.lkey{color:var(--muted)}
.lval{font-weight:500;color:var(--foreground)}
.lval.green{display:inline-flex;align-items:center;background:#dcfce7;color:#166534;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}

/* TABLE */
.cap-table{width:100%;border-collapse:collapse;font-size:12px}
.cap-table th{padding:9px 14px;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);text-align:left}
.cap-table th.hi{color:var(--royal-blue);background:rgba(59,91,219,0.05)}
.cap-table td{padding:13px 14px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--foreground)}
.cap-table td.hi{background:rgba(59,91,219,0.04)}
.cap-table tr:last-child td{border-bottom:none}
.yes{color:var(--royal-blue);font-weight:600}
.no{color:#EF4444;font-weight:500}
.partial{color:#F59E0B;font-weight:500}

/* TX */
.tx-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.tx-row:last-child{border-bottom:none}
.tx-label{font-size:13px;font-weight:500;color:var(--foreground)}
.tx-sub{font-size:11px;color:var(--muted);margin-top:1px}
.tx-val{font-size:13px;font-weight:600;color:var(--foreground);text-align:right}
.tx-val.blue{color:var(--royal-blue)}
.tx-val.muted{color:var(--muted);text-decoration:line-through;font-weight:400}

/* MINI STAT */
.mini-stat{border-left:2px solid var(--royal-blue);padding-left:12px}
.mini-stat .val{font-size:20px;font-weight:700;letter-spacing:-0.02em;color:var(--foreground)}
.mini-stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}

/* PHASE */
.phase-badge{display:inline-flex;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 9px;border-radius:4px;background:rgba(59,91,219,0.1);color:var(--royal-blue);margin-right:8px}

/* TEAM AVATAR */
.avatar{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.avatar.blue{background:var(--royal-blue);color:#fff}
.avatar.light{background:rgba(59,91,219,0.1);color:var(--royal-blue)}

/* YEAR CARD */
.year-card{border:1px solid var(--border);border-radius:12px;padding:22px;background:var(--white)}
.year-card.featured{background:var(--royal-blue);border-color:var(--royal-blue);color:#fff}
.year-num{font-size:clamp(22px,3vw,34px);font-weight:700;letter-spacing:-0.025em;color:var(--foreground);margin:6px 0 12px}
.year-card.featured .year-num{color:#fff}
.year-card.featured .stat-label{color:rgba(255,255,255,0.6)}
.year-card.featured .year-stat-val{color:#fff}
.year-stat-val{font-size:13px;font-weight:500;color:var(--foreground)}

/* MOAT STAT */
.moat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.moat-stat{background:var(--bg);border-radius:8px;padding:10px 12px}
.moat-stat .mv{font-size:15px;font-weight:700;color:var(--foreground)}
.moat-stat .ml{font-size:11px;color:var(--muted);margin-top:1px}

/* ALLOCATION */
.alloc-bar{height:6px;border-radius:3px;display:flex;overflow:hidden;margin:14px 0 6px}
.alloc-seg{height:100%}

/* RATE BOX */
.rate-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;overflow:hidden}

/* SLIDE PADDING */
.slide-body{flex:1;padding:56px 56px 52px;overflow:hidden;display:flex;flex-direction:column;justify-content:center}
.slide-body.top-align{justify-content:flex-start;padding-top:52px}

/* SCROLLABLE */
.scroll-inner{overflow-y:auto;flex:1;-ms-overflow-style:none;scrollbar-width:none}
.scroll-inner::-webkit-scrollbar{display:none}

/* CHECK/CROSS */
.check-icon{display:inline-flex;width:22px;height:22px;border-radius:50%;background:rgba(59,91,219,0.1);color:var(--royal-blue);align-items:center;justify-content:center;font-size:11px;font-weight:700}
.cross-icon{display:inline-flex;width:22px;height:22px;border-radius:50%;background:#fef2f2;color:#EF4444;align-items:center;justify-content:center;font-size:11px}
.part-icon{display:inline-flex;width:22px;height:22px;border-radius:50%;background:#fffbeb;color:#F59E0B;align-items:center;justify-content:center;font-size:11px;font-weight:700}

/* TABLE ALIGN */
.cap-table td[style*="center"]{text-align:center}

.mode-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:5px 14px;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.6);transition:all 0.2s;white-space:nowrap;letter-spacing:0.02em}
.mode-btn.light-mode-btn{border-color:var(--border);color:var(--muted);background:transparent}
.mode-btn:hover{border-color:var(--royal-blue);color:var(--royal-blue);background:rgba(59,91,219,0.06)}
body.scroll-mode .slide.hidden-next,body.scroll-mode .slide.hidden-prev{opacity:1;transform:none;pointer-events:all;position:relative}
body.scroll-mode .slide-viewport{overflow-y:auto}
body.scroll-mode .slide{position:relative;min-height:100vh}

/* WEBSITE TOP NAV */
.website-nav{
  position:fixed;top:0;left:0;right:0;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;
  background:rgba(255,255,255,0.97);
  border-bottom:0.5px solid var(--border);
  backdrop-filter:blur(12px);
  z-index:200;
}
.website-nav .wn-logo{
  font-size:16px;font-weight:700;color:var(--foreground);
  letter-spacing:-0.02em;text-decoration:none;
}
.website-nav .wn-logo span{color:var(--royal-blue)}
.website-nav .wn-links{
  display:flex;align-items:center;gap:32px;
}
.website-nav .wn-link{
  font-size:13px;font-weight:400;color:var(--muted);
  cursor:pointer;transition:color 0.2s;text-decoration:none;
  border:none;background:none;padding:0;
}
.website-nav .wn-link:hover{color:var(--foreground)}
.website-nav .wn-link.active{color:var(--foreground);font-weight:500}
.website-nav .wn-cta{
  font-size:13px;font-weight:500;color:#fff;
  background:var(--royal-blue);border:none;
  padding:8px 20px;border-radius:20px;cursor:pointer;
  transition:all 0.2s;
}
.website-nav .wn-cta:hover{background:#2d4bc4}
/* Push content down for top nav */
.progress-bar{top:56px!important}
.slide-viewport{top:56px!important;bottom:52px!important;position:fixed;left:0;right:0}
.bottom-nav{bottom:0}

/* ── MOBILE RESPONSIVE ── */
@media (max-width: 768px) {
  .top-nav { padding: 12px 16px !important; }
  .wn-links { display: none !important; }
  .wn-cta { display: none !important; }
  
  .slide-body { padding: 16px !important; }
  .slide-body.top-align { padding: 16px !important; }
  
  .slide-title { font-size: 22px !important; }
  .slide-sub { font-size: 12px !important; }
  
  .grid-2, .grid-3 { grid-template-columns: 1fr !important; gap: 10px !important; }
  .split-wide { flex-direction: column !important; gap: 16px !important; }
  
  .card { padding: 14px !important; }
  
  .stat-big { font-size: 36px !important; }
  
  .year-card { padding: 14px !important; }
  .year-num { font-size: 28px !important; }
  
  .mini-stat { padding: 0 !important; border: none !important; }
  
  /* Cover slide mobile */
  #s0 h1 { font-size: 56px !important; }
  #s0 .stat-big { font-size: 20px !important; }
  
  /* Bottom nav mobile */
  .bottom-nav { padding: 8px 12px !important; font-size: 10px !important; }
  .dot-nav { display: none !important; }
  .scroll-btn { display: none !important; }

  /* Stats grid in cards - stack on mobile */
  [style*="grid-template-columns:1fr 1fr 1fr 1fr"] { 
    grid-template-columns: 1fr 1fr !important; 
    gap: 12px !important;
  }
  [style*="grid-template-columns:1fr 1fr 1fr"] { 
    grid-template-columns: 1fr !important; 
  }
  [style*="grid-template-columns:1fr 1fr"] { 
    grid-template-columns: 1fr !important; 
  }

  /* Hide dot grid decorations on mobile */
  .noise-overlay { display: none !important; }

  /* Competitive dark card */
  .dark-card { padding: 14px !important; }

  /* Pill tags wrap */
  .pill { font-size: 9px !important; padding: 2px 8px !important; }

  /* Bottom bar stats */
  .bg-card [style*="grid-template-columns"] {
    grid-template-columns: 1fr 1fr !important;
    gap: 12px !important;
  }

  /* Cover stats row */
  #s0 [style*="grid-template-columns:1fr 1fr 1fr 1fr"] {
    grid-template-columns: 1fr 1fr !important;
  }
}

@media (max-width: 480px) {
  .slide-title { font-size: 18px !important; }
  #s0 h1 { font-size: 42px !important; }
  .stat-big { font-size: 28px !important; }
  .year-num { font-size: 22px !important; }
}

</style>
</head>
<body>


<nav class="website-nav" id="websiteNav">
  <a class="wn-logo" href="#">rebuq<span>.</span></a>
  <div class="wn-links">
    <button class="wn-link" onclick="jumpTo(1)">Problem</button>
    <button class="wn-link" onclick="jumpTo(2)">Solution</button>
    <button class="wn-link" onclick="jumpTo(4)">Market</button>
    <button class="wn-link" onclick="jumpTo(11)">Financials</button>
    <button class="wn-link" onclick="jumpTo(12)">Team</button>
  </div>
  <button class="wn-cta" onclick="jumpTo(13)">Investment Deck</button>
</nav>
<div class="progress-bar"><div class="progress-fill" id="pFill" style="width:6.67%"></div></div>

<div class="deck">
<div class="slide-viewport" id="viewport"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav dark-nav" id="bottomNav">
  <div style="display:flex;align-items:center;gap:8px">
    <span class="brand-label dark-text" id="brandLabel">REBUQ</span>
    <span style="color:rgba(255,255,255,0.15);font-size:11px">/</span>
    <span class="slide-id dark-text" id="slideId">01 — Cover</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px"><button class="mode-btn" id="modeBtn" onclick="toggleScroll()">&#x21D5; Scroll</button><div class="dot-nav" id="dotNav"></div></div>
  <div class="nav-arrows">
    <button class="arrow-btn prev-dark" id="prevBtn" onclick="nav(-1)" disabled>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button class="arrow-btn next-btn" id="nextBtn" onclick="nav(1)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>
</div>

<script>
const SLIDES = [
  {
    id:'cover', title:'Cover', dark:true,
    html:`<div class="slide dark-slide" id="s0" style="position:relative;overflow:hidden;display:flex;flex-direction:column;background:#0D1A30;height:100%">

      <!-- Grid texture -->
      <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(59,91,219,0.07) 1px,transparent 1px),linear-gradient(90deg,rgba(59,91,219,0.07) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0"></div>

      <!-- Bottom gradient -->
      <div style="position:absolute;bottom:0;left:0;right:0;height:45%;background:linear-gradient(to bottom,transparent,rgba(20,40,90,0.3));pointer-events:none;z-index:0"></div>

      <!-- Dot grid top right -->
      <div style="position:absolute;top:80px;right:56px;display:grid;grid-template-columns:repeat(6,8px);gap:8px;opacity:0.15;pointer-events:none;z-index:1">
        ${Array(24).fill('<div style="width:4px;height:4px;border-radius:50%;background:#3B5BDB"></div>').join('')}
      </div>

      <!-- Badge -->
      <div style="position:relative;z-index:10;padding:32px 64px 0">

    html:`<div class="slide light-slide" id="s5">

            <div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px">

              <div style="padding:10px 12px;display:flex;justify-content:space-between;font-size:12px"><span style="color:var(--muted)">Traveller saves vs OTA</span><span style="font-weight:600;color:#166534">₹2,100 ✓</span></div>

              <span class="pill" style="font-size:10px">50+ supplier APIs</span>
              <span class="pill" style="font-size:10px">500k+ properties</span>
              <span class="pill" style="font-size:10px">WhatsApp alert</span>
              <span class="pill" style="font-size:10px">1 tap to rebook</span>

            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
              <div style="font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--royal-blue)">Revenue Stream 02</div>
              <div style="font-size:9px;padding:2px 10px;border-radius:4px;background:rgba(59,91,219,0.08);color:var(--royal-blue);font-weight:600">LIVE NOW</div>
            </div>
            <h3 style="font-size:20px;font-weight:700;letter-spacing:-0.02em;margin-bottom:10px">Members-Only Direct Booking</h3>
            <p style="font-size:12px;color:var(--muted);line-height:1.65;margin-bottom:16px">500k+ exclusive pre-negotiated hotel deals at 12% below OTA rates — available only to rebuq members. rebuq earns a 12% commission per booking. Traveller always pays less than any public platform.</p>

            <div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px">
              <div style="padding:8px 12px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted)"><span>Example — ₹40,000 avg booking</span><span>INR</span></div>

              <div style="padding:10px 12px;display:flex;justify-content:space-between;font-size:12px;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">Wholesale cost to rebuq (85%)</span><span style="font-weight:600;color:#EF4444">₹34,000</span></div>
              <div style="padding:10px 12px;display:flex;justify-content:space-between;font-size:12px;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">rebuq member price (+12% on cost)</span><span style="font-weight:600;color:var(--royal-blue)">₹38,080</span></div>

              <div style="padding:10px 12px;display:flex;justify-content:space-between;font-size:12px"><span style="color:var(--muted)">Traveller saves vs OTA</span><span style="font-weight:600;color:#166534">₹1,920 ✓</span></div>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:6px">
              <span class="pill" style="font-size:10px">500k+ hotels</span>
              <span class="pill" style="font-size:10px">12% below OTA</span>
              <span class="pill" style="font-size:10px">No app needed</span>
              <span class="pill" style="font-size:10px">Members only</span>

        <!-- Bottom combined economics -->

            </div>
            <div class="mini-stat" style="padding:0 20px;border-left:1px solid var(--border)">
              <div class="val" style="font-size:18px">₹7,854</div>

            </div>

            </div>
          </div>
        </div>

    </div>`

  {
    id:'competitive', title:'Competitive Alignment', dark:false,
    html:`<div class="slide light-slide" id="s8">
      <div class="top-nav"><div class="nav-section-label light"><span class="section-num">07</span><div class="nav-dash light"></div><span>COMPETITIVE ALIGNMENT</span></div><div class="nav-logo light">rebuq<span>.</span></div></div>
      <div class="slide-body top-align">
        <h2 class="slide-title" style="font-size:clamp(24px,3vw,36px);margin-bottom:6px;line-height:1.2">Every existing player is structurally incentivised<br>to <span style="color:var(--royal-blue)">ignore your savings.</span></h2>
        <p class="slide-sub" style="margin-bottom:24px">It's not a technology gap. It's an incentive gap. rebuq is the only player whose revenue is perfectly aligned with the traveller.</p>

        <!-- 4 player cards -->
        <div class="grid-2" style="margin-bottom:16px;gap:14px">

          <!-- OTAs -->
          <div class="card dark-card" style="padding:20px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
              <div style="font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(59,91,219,0.7)">Online Travel Agents (OTAs)</div>
              <div style="font-size:9px;padding:2px 8px;border-radius:4px;background:rgba(239,68,68,0.2);color:#EF4444;font-weight:600">INCENTIVE: AGAINST YOU</div>
            </div>
            <p style="font-size:12px;color:rgba(255,255,255,0.6);line-height:1.65;margin-bottom:12px">OTAs earn 10–20% commission on gross booking value. Every time a price drops and a traveller saves, the OTA earns less. They are mathematically incentivised to never alert you.</p>
            <div style="background:rgba(255,255,255,0.05);border-radius:8px;padding:12px">
              <div style="font-size:9px;color:rgba(59,91,219,0.7);font-weight:600;letter-spacing:0.08em;margin-bottom:8px">THE MATH</div>
              <div style="display:flex;justify-content:space-between;align-items:center">
                <div><div style="font-size:9px;color:rgba(255,255,255,0.4)">Commission at booking</div><div style="font-size:18px;font-weight:700;color:#fff">₹4,000</div><div style="font-size:9px;color:rgba(255,255,255,0.3)">10% on ₹40,000</div></div>
                <div style="font-size:16px;color:rgba(255,255,255,0.2)">→</div>
                <div style="text-align:right"><div style="font-size:9px;color:rgba(255,255,255,0.4)">After price drop</div><div style="font-size:18px;font-weight:700;color:#EF4444">₹3,400</div><div style="font-size:9px;color:rgba(255,255,255,0.3)">10% on ₹34,000</div></div>
              </div>
              <div style="font-size:10px;color:rgba(255,255,255,0.25);text-align:center;margin-top:8px">OTA loses ₹600 every time you save — zero incentive to build this</div>
            </div>
          </div>

          <!-- Offline Agents -->
          <div class="card" style="padding:20px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
              <div style="font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--royal-blue)">Offline Travel Agents</div>
              <div style="font-size:9px;padding:2px 8px;border-radius:4px;background:rgba(239,68,68,0.08);color:#EF4444;font-weight:600">INCENTIVE: AGAINST YOU</div>
            </div>
            <p style="font-size:12px;color:var(--muted);line-height:1.65;">Offline agents earn commission the same way OTAs do — on gross booking value. Additionally, automating post-booking savings would make their role redundant. They have both a financial and existential reason to never build this.</p>
          </div>

          <!-- Hotels -->
          <div class="card" style="padding:20px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
              <div style="font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--royal-blue)">Hotels</div>
              <div style="font-size:9px;padding:2px 8px;border-radius:4px;background:rgba(239,68,68,0.08);color:#EF4444;font-weight:600">INCENTIVE: AGAINST YOU</div>
            </div>
            <p style="font-size:12px;color:var(--muted);line-height:1.65;">Hotels use yield management to maximise revenue per room. When a guest rebooks at a lower rate, the hotel earns less per night. They will never proactively alert travellers to price drops — their entire pricing strategy depends on travellers not noticing.</p>
          </div>

          <!-- Tech Startups -->
          <div class="card" style="padding:20px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
              <div style="font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--royal-blue)">New Tech Entrants</div>
              <div style="font-size:9px;padding:2px 8px;border-radius:4px;background:rgba(245,158,11,0.08);color:#F59E0B;font-weight:600">CANNOT BUILD IT</div>
            </div>
            <p style="font-size:12px;color:var(--muted);line-height:1.65;">Even a well-funded startup faces two walls: wholesale supplier API access requires years of established travel industry relationships — and a day-one audience of premium travellers. rebuq has both through Visa2Fly. A new entrant has neither.</p>
          </div>
        </div>

        <!-- Bottom callout -->
        <div class="card" style="padding:14px 20px;background:rgba(59,91,219,0.05);border:1px solid rgba(59,91,219,0.2)">
          <div style="font-size:13px;color:var(--royal-blue);line-height:1.65;text-align:center;font-weight:500">rebuq is the only player in the travel chain whose revenue <strong>increases</strong> when the traveller saves more.<br>That alignment is the moat — and it cannot be replicated by anyone already inside the industry.</div>
        </div>
      </div>
    </div>`
  },
  {

              <div style="font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--royal-blue);margin-bottom:6px">Channel 03 · Ongoing</div>

const TOTAL = SLIDES.length;
let current = 0;
let transitioning = false;

const viewport = document.getElementById('viewport');
const pFill = document.getElementById('pFill');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const dotNav = document.getElementById('dotNav');
const bottomNav = document.getElementById('bottomNav');
const slideId = document.getElementById('slideId');
const brandLabel = document.getElementById('brandLabel');

// Build slides
SLIDES.forEach((s,i)=>{
  const wrapper = document.createElement('div');
  wrapper.innerHTML = s.html;
  const el = wrapper.firstElementChild;
  el.classList.remove('active');
  el.classList.add(i===0?'active':'hidden-next');
  el.id = 's'+i;
  viewport.appendChild(el);
});

// Build dots
SLIDES.forEach((_,i)=>{
  const d = document.createElement('button');
  d.className = 'dot '+(i===0?'active':'inactive-dark');
  d.onclick = ()=>goTo(i);
  dotNav.appendChild(d);
});

function updateNav(){
  const dark = SLIDES[current].dark;
  // bottom nav
  bottomNav.className = 'bottom-nav '+(dark?'dark-nav':'light-nav');
  brandLabel.className = 'brand-label '+(dark?'dark-text':'light-text');
  slideId.className = 'slide-id '+(dark?'dark-text':'light-text');
  slideId.textContent = String(current+1).padStart(2,'0')+' — '+SLIDES[current].title;
  // progress
  pFill.style.width = ((current+1)/TOTAL*100)+'%';
  // prev btn
  prevBtn.disabled = current===0;
  var mb=document.getElementById('modeBtn');if(mb)mb.className='mode-btn '+(dark?'':'light-mode-btn');
  prevBtn.className = 'arrow-btn '+(dark?'prev-dark':'prev-light');
  // next btn
  nextBtn.disabled = current===TOTAL-1;
  // dots
  const isDark = dark;
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.className = 'dot '+(i===current?'active':(isDark?'inactive-dark':'inactive-light'));
  });
}

function goTo(n){
  if(transitioning||n===current||n<0||n>=TOTAL) return;
  transitioning = true;
  const dir = n>current?'next':'prev';
  const old = document.getElementById('s'+current);
  const neo = document.getElementById('s'+n);
  old.classList.remove('active');
  old.classList.add(dir==='next'?'hidden-prev':'hidden-next');
  neo.classList.remove('hidden-next','hidden-prev');
  neo.classList.add('active');
  current = n;
  updateNav();
  updateNavLinks();
  setTimeout(()=>{ transitioning=false; },380);
}

window.nav = function(d){ goTo(current+d); }

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' '){e.preventDefault();goTo(current+1)}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();goTo(current-1)}
});

let ty=0;
document.addEventListener('touchstart',e=>{ty=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{
  const dy=ty-e.changedTouches[0].clientY;
  if(Math.abs(dy)>50) goTo(current+(dy>0?1:-1));
},{passive:true});


let scrollMode=false;
function toggleScroll(){
  scrollMode=!scrollMode;
  const btn=document.getElementById('modeBtn');
  const vp=document.querySelector('.slide-viewport');
  document.body.classList.toggle('scroll-mode',scrollMode);
  if(scrollMode){
    btn.textContent='⇔ Slides';
    document.querySelectorAll('.slide').forEach(function(s){s.classList.remove('hidden-next','hidden-prev');s.classList.add('active');});
    vp.style.overflowY='auto';
  } else {
    btn.textContent='⇕ Scroll';
    vp.style.overflowY='hidden';
    document.querySelectorAll('.slide').forEach(function(s,i){
      s.classList.remove('active','hidden-next','hidden-prev');
      if(i===current){s.classList.add('active');}
      else if(i<current){s.classList.add('hidden-prev');}
      else{s.classList.add('hidden-next');}
    });
  }
}

function jumpTo(n){ window.goTo(n); }

function updateNavLinks(){
  const map = {1:'Problem',2:'Solution',4:'Market',11:'Financials',12:'Team'};
  document.querySelectorAll('.wn-link').forEach(function(btn){
    btn.classList.remove('active');
  });
  var links = document.querySelectorAll('.wn-link');
  links.forEach(function(btn, i){
    var targets = [1,2,4,11,12];
    if(targets[i] === current) btn.classList.add('active');
  });
}
updateNav();
updateNavLinks();
</script>
